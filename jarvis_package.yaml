name: "home-assistant"
display_name: "Home Assistant"
description: "Full Home Assistant integration with device control, status queries, and background state caching"
version: "1.0.0"
min_jarvis_version: "0.9.0"
license: "MIT"
author:
  github: "alexberardi"
categories: ["smart-home", "home"]
platforms: ["darwin", "linux"]
keywords: ["home assistant", "smart home", "lights", "devices"]

packages:
  - name: httpx
    version: ">=0.24.0"

secrets:
  - key: HA_URL
    scope: integration
    value_type: string
    description: "Home Assistant URL (e.g., http://homeassistant.local:8123)"
  - key: HA_TOKEN
    scope: integration
    value_type: string
    description: "Home Assistant long-lived access token"
    is_sensitive: true
